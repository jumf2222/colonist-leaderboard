<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MENU SCREEN -->
    <div id="menu-screen">
        <h1 id="menu-title">CATAN</h1>
        <div id="menu-buttons">
            <button class="menu-btn" id="solo-btn">Play Solo (vs 3 CPUs)</button>
            <button class="menu-btn" id="mp-btn">Multiplayer</button>
        </div>
        <!-- MULTIPLAYER SUB-MENU -->
        <div id="mp-menu" style="display:none;">
            <div class="panel" style="max-width:400px;margin:0 auto;">
                <h3>Multiplayer</h3>
                <div style="margin:10px 0">
                    <label>Your Name:</label>
                    <input type="text" id="player-name" value="Player" maxlength="20" class="mp-input">
                </div>
                <div style="display:flex;gap:8px;justify-content:center;margin:10px 0;">
                    <button class="action-btn" id="create-lobby-btn">Create Game</button>
                    <button class="action-btn" id="refresh-lobbies-btn">Refresh Lobbies</button>
                </div>
                <div style="margin:10px 0">
                    <label>Or join by code:</label>
                    <div style="display:flex;gap:6px;margin-top:4px;">
                        <input type="text" id="join-code" placeholder="Lobby ID" class="mp-input" style="width:120px;">
                        <button class="action-btn" id="join-code-btn" style="width:auto;">Join</button>
                    </div>
                </div>
                <div id="lobby-list"></div>
                <button class="action-btn" id="mp-back-btn" style="background:#555;margin-top:10px;">Back</button>
            </div>
        </div>
        <!-- LOBBY WAITING ROOM -->
        <div id="lobby-screen" style="display:none;">
            <div class="panel" style="max-width:400px;margin:0 auto;">
                <h3>Lobby <span id="lobby-id-display"></span></h3>
                <div id="lobby-players"></div>
                <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
                    <button class="action-btn" id="start-game-btn" style="background:#27ae60;" disabled>Start Game</button>
                    <button class="action-btn" id="leave-lobby-btn" style="background:#555;">Leave</button>
                </div>
                <p id="lobby-share" style="font-size:12px;margin-top:8px;opacity:0.7;"></p>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-container" style="display:none;">
        <div id="top-bar">
            <div id="player-scores"></div>
            <div id="turn-indicator"></div>
        </div>
        <div id="main-area">
            <div id="left-panel">
                <div id="dev-cards-panel" class="panel">
                    <h3>Development Cards</h3>
                    <div id="dev-cards-list"></div>
                </div>
                <div id="trade-panel" class="panel">
                    <h3>Trade</h3>
                    <div id="trade-controls">
                        <div class="trade-row">
                            <label>Give:</label>
                            <select id="trade-give"></select>
                            <span id="trade-ratio">4</span>x
                        </div>
                        <div class="trade-row">
                            <label>Get:</label>
                            <select id="trade-get"></select>
                            <span>1x</span>
                        </div>
                        <button id="trade-btn" class="action-btn">Trade with Bank</button>
                    </div>
                </div>
            </div>
            <div id="board-container">
                <canvas id="board-canvas" width="700" height="650"></canvas>
                <div id="robber-prompt" class="overlay" style="display:none;">
                    <p>Move the robber! Click a hex tile.</p>
                </div>
                <div id="steal-prompt" class="overlay" style="display:none;">
                    <p>Choose a player to steal from:</p>
                    <div id="steal-buttons"></div>
                </div>
                <div id="discard-prompt" class="overlay" style="display:none;">
                    <p>You must discard <span id="discard-count"></span> cards. Click resources to discard.</p>
                    <div id="discard-resources"></div>
                    <button id="discard-confirm-btn" class="action-btn" disabled>Confirm Discard</button>
                </div>
            </div>
            <div id="right-panel">
                <div id="resources-panel" class="panel">
                    <h3>Your Resources</h3>
                    <div id="resource-counts"></div>
                </div>
                <div id="actions-panel" class="panel">
                    <h3>Actions</h3>
                    <button id="roll-dice-btn" class="action-btn">Roll Dice</button>
                    <button id="build-road-btn" class="action-btn">Build Road (1W 1B)</button>
                    <button id="build-settlement-btn" class="action-btn">Build Settlement (1W 1B 1S 1G)</button>
                    <button id="build-city-btn" class="action-btn">Upgrade to City (2G 3O)</button>
                    <button id="buy-dev-card-btn" class="action-btn">Buy Dev Card (1S 1G 1O)</button>
                    <button id="end-turn-btn" class="action-btn">End Turn</button>
                </div>
                <div id="dice-result"></div>
            </div>
        </div>
        <div id="log-container">
            <div id="game-log"></div>
        </div>
    </div>
    <div id="winner-overlay" class="overlay" style="display:none;">
        <div id="winner-message"></div>
        <button onclick="location.reload()" class="action-btn">Play Again</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
